name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to factory-testing-vps
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment: factory-testing
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        # appleboy/ssh-action v1.2.0 pinned by commit SHA
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/lbresponse-api
            git fetch origin main
            # Refuse to deploy if the server checkout has diverged from origin/main —
            # someone has been editing files on the server. Investigate, don't paper over.
            git checkout main
            git pull --ff-only origin main
            docker compose up -d --build --remove-orphans
            docker compose ps
            docker image prune -f
