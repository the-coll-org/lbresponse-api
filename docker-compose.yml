services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: lbresponse-api:local
    container_name: lbresponse-api
    init: true
    restart: unless-stopped
    # Bind to loopback only — Caddy on the host reverse-proxies to it.
    # For pure local dev without Caddy, drop the "127.0.0.1:" prefix.
    # HOST_PORT controls the host-side port; the container always listens on 3000 internally.
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    mem_limit: 512m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
