services:
  - type: web
    name: lbresponse-api
    runtime: node
    repo: https://github.com/the-coll-org/lbresponse-api.git
    branch: main
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_CRED_JSON
        sync: false # Paste service-account.json content in Render dashboard
      - key: FIREBASE_DB_URL
        sync: false # Set in Render dashboard
